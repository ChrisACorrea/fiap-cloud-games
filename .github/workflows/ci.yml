name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  TESTCONTAINERS_RYUK_DISABLED: true

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore --warnaserror

      - name: Unit Tests
        run: dotnet test tests/FiapCloudGames.UnitTests --configuration Release --no-build --logger "trx;LogFileName=unit-tests.trx"

      - name: Integration Tests
        run: dotnet test tests/FiapCloudGames.IntegrationTests --configuration Release --no-build --logger "trx;LogFileName=integration-tests.trx"
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 7
